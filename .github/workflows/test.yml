name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CI: true
  NODE_VERSION: 22

jobs:
  lint:
    name: Lint
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Lint JS & Handlebars
        run: pnpm lint

  test:
    name: Tests
    needs: [lint]
    runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Run tests (floating dependencies)
        run: pnpm test:ember

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:ember

  try-one:
    name: Additional Tests
    needs: [test]
    runs-on: [ubuntu-latest]

    strategy:
      matrix:
        scenario:
          - ember-lts-4.8
          - ember-lts-4.12
          # Disable for now since ember-data@4 causes an embroider build error. See https://github.com/projectcaluma/ember-emeis/pull/625#issuecomment-1614488464
          # - ember-release
          - embroider-safe
          - embroider-optimized
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            node_modules
            pnpm-lock.yaml
          key: pnpm-${{ matrix.scenario }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('config/ember-try.js') }}
          restore-keys: |
            pnpm-${{ matrix.scenario }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('config/ember-try.js') }}
            pnpm-${{ matrix.scenario }}-
            pnpm-

      - name: Run tests
        run: pnpm ember try:one ${{ matrix.scenario }}
